<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Private Fields Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    window.TrelloPowerUp.initialize({
      'card-back-section': function(t, options ) {
        return {
          title: 'Private Fields',
          icon: './icon.svg',
          content: {
            type: 'iframe',
            url: t.signUrl('./card-back.html'),
            height: 300
          }
        };
      },
      'show-settings': function(t, options) {
        return t.modal({
          title: 'Configuração - Private Fields',
          url: t.signUrl('./settings.html'),
          height: 700
        });
      },
      'board-buttons': function(t, options) {
        return [{
          icon: './icon.svg',
          text: 'Exportar Private Fields',
          callback: function(t) {
            return t.modal({
              title: 'Exportar Dados para Excel',
              url: t.signUrl('./export.html'),
              height: 400
            });
          }
        }];
      }
    });
  </script>
</body>
</html>
